<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JanitorAI Writer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jura:wght@300..700&family=Poppins:wght@300;400;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="sidebar.css">
  <script defer src="sidebar.js"></script>
</head>

<body>
  <div class="container">

    <header>
      <h2>Writing Assistant</h2>
      <div class="status-indicator online" title="Ready"></div>
    </header>

    <div id="status-bar" class="status-bar">
      <span id="status-icon" class="icon">✨</span>
      <span id="status-text">Ready to enhance</span>
    </div>

    <div class="input-section">
      <label for="input-text">Your Draft</label>
      <textarea id="input-text" placeholder="Type here or text will appear from chat..."></textarea>
    </div>

    <!-- Suggestions Section -->
    <div class="suggestions-section">
      <div class="section-header">
        <label>Quick Suggestions</label>
        <button id="suggest-btn" class="icon-btn-small" title="Get Ideas">💡</button>
      </div>
      <div id="suggestion-chips" class="chips-container">
        <!-- Chips will be injected here -->
        <span class="placeholder-text">Click 💡 to brainstorm next moves.</span>
      </div>
    </div>

    <div class="controls-section">
      <label for="style-select">Enhancement Style</label>
      <select id="style-select">
        <option value="roleplay">🎭 Roleplay (Immersive)</option>
        <option value="novel">📖 Novel (Descriptive)</option>
        <option value="casual">💬 Casual (Natural)</option>
      </select>

      <div class="model-info">
        <small id="model-display">Claude 3.5 Sonnet</small>
      </div>

      <button id="enhance-btn" class="primary-btn">
        <span class="icon">✨</span> Enhance Text
      </button>
    </div>

    <div class="output-section hidden" id="output-section">
      <div class="output-header">
        <label>Suggestion</label>
        <div class="actions">
          <button id="copy-btn" class="icon-btn" title="Copy to Clipboard">📋</button>
        </div>
      </div>
      <div id="output-text" class="output-box" contenteditable="true"></div>

      <button id="apply-btn" class="secondary-btn">
        <span class="icon">⏎</span> Insert to Chat
      </button>
    </div>

    <!-- Settings Footer (collapsible) -->
    <div class="settings-footer">
      <div id="settings-panel" class="settings-panel" hidden>
        <div class="settings-field">
          <label for="settings-api-key">OpenRouter API Key</label>
          <input type="password" id="settings-api-key" placeholder="sk-or-...">
          <small class="settings-hint">Stored locally in your browser</small>
        </div>
        <div class="settings-field">
          <label for="settings-model-id">AI Model ID <span class="optional">(optional)</span></label>
          <input type="text" id="settings-model-id" placeholder="anthropic/claude-3.5-sonnet">
        </div>
        <button id="settings-save-btn" class="primary-btn settings-save-btn">Save Settings</button>
        <a href="https://openrouter.ai/keys" target="_blank" class="settings-link">Get an API Key ↗</a>
      </div>
      <button id="settings-toggle" class="settings-toggle-btn" aria-expanded="false" aria-controls="settings-panel">
        <span class="settings-toggle-icon">⚙️</span>
        <span>Settings</span>
        <span class="settings-chevron">▾</span>
      </button>
    </div>
  </div>

</body>

</html>
