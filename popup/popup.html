<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="settings-container">
        <h3>⚙️ Settings</h3>

        <div class="form-group">
            <label for="api-key">OpenRouter API Key</label>
            <input type="password" id="api-key" placeholder="sk-or-...">
            <small>Stored locally in your browser</small>
        </div>

        <div class="form-group">
            <label for="model-id">AI Model ID (Optional)</label>
            <input type="text" id="model-id" placeholder="anthropic/claude-3.5-sonnet">
        </div>

        <button id="save-btn">Save Settings</button>
        <button id="open-sidebar-btn" class="secondary-btn">Open Sidebar</button>
        <div id="status" class="status-msg"></div>

        <hr>

        <p class="footer">
            <a href="https://openrouter.ai/keys" target="_blank">Get API Key</a>
        </p>
    </div>
    <script src="popup.js"></script>
</body>

</html>
